<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PhotoCast" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />    

    <title>PhotoCast</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        color: white;
        font-family: sans-serif;
        padding-top: env(safe-area-inset-top);
        /* Ensure the body respects the bottom safe area */
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }


      #ui-header {
        flex: 0 0 auto;
        background: #000;
        z-index: 5000;
        border-bottom: 1px solid #333;
        position: relative;
        text-align: center;
      }
      #progress-outer {
        width: 100%;
        background: #222;
        height: 4px;
        position: absolute;
        bottom: 0;
        left: 0;
        z-index: 6000;
        display: none;
      }
      #progress-inner {
        height: 100%;
        background: #4fc3f7;
        width: 0%;
        transition: width 0.3s ease;
      }
      #trip-label {
        font-size: 1.1rem;
        font-weight: 900;
        margin: 0;
        padding: 12px 15px 5px 15px;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .control-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        align-items: center;
        padding: 5px 10px 12px 10px;
      }

      button,
      input,
      select {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #333;
        font-weight: bold;
        background: #1a1a1a;
        color: white;
        font-size: 0.85rem;
        -webkit-appearance: none;
        cursor: pointer;
      }
      input {
        flex: 1;
        max-width: 250px;
        text-align: center;
      }
      #timer {
        color: #4fc3f7;
        font-weight: 900;
        font-size: 1.1rem;
        min-width: 35px;
      }

      /* Cast Button States */
      .btn-cast[data-status="OFF"],
      .btn-cast[data-status="OFF"]:disabled {
        background: #555 !important;
        color: #999 !important;
        cursor: not-allowed !important;
      }
      .btn-cast[data-status="AVAILABLE"] {
        background: #e53935 !important; /* Red */
        color: white !important;
      }
      .btn-cast[data-status="CONNECTING"],
      .btn-cast[data-status="CONNECTING"]:disabled {
        background: #ff9800 !important; /* Orange */
        color: white !important;
        cursor: wait !important;
      }
      .btn-cast[data-status="ACTIVE"] {
        background: #388e3c !important; /* Green */
        color: white !important;
      }

      /* Settings Button Icon Styling */
      .icon-btn-header {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
      }

      #settings-panel {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        width: 280px;
        max-width: 80%;
        background: #111;
        z-index: 7000;
        transition:
          transform 0.28s ease,
          opacity 0.2s ease;
        padding: 20px;
        box-shadow: -4px 0 12px rgba(0, 0, 0, 0.6);
        transform: translateX(100%);
        opacity: 0;
        pointer-events: none;
      }
      #settings-panel.open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }

      #theater-container {
        flex: 1 1 auto;
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        z-index: 100;
      }
      
      #img-wrapper {
        position: relative;
        display: flex;
        width: 100%;
        flex: 1 1 0px; 
        min-height: 0;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-sizing: border-box;
      }
      #hero-img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #scan-overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
      }
      #scan-text {
        font-size: 5rem;
        font-weight: 900;
        color: #4fc3f7;
        text-shadow: 0 0 30px #000;
      }
      .is-preparing #scan-overlay {
        display: flex;
      }

      #playback-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
        flex: 0 0 auto; 
        z-index: 550;
        /* Add a little bit of breathing room for mobile devices */
        margin-bottom: 20px;
      }
      .icon-btn {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .icon-btn:hover {
        background: #333;
      }
      .icon-btn svg {
        fill: white;
        width: 24px;
        height: 24px;
      }
      /* Pause Button State Inversion */
      .icon-btn.paused {
        background: #fbc02d !important;
      }
      .icon-btn.paused svg {
        fill: #000 !important;
      }

      #scrub-bar {
        width: 100%;
        max-width: 1200px;
        padding: 0 15px;
        box-sizing: border-box;
        margin: 5px 0 10px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 550;
        gap: 4px;
        /* Add this line to push the scrub bar up away from Android/iOS nav bars */
        margin-bottom: calc(10px + env(safe-area-inset-bottom, 20px));
      }
      #scrub-count {
        font-weight: 900;
        font-size: 0.9rem;
        color: #4fc3f7;
      }
      
      #scrubber {
        width: 100%;
        -webkit-appearance: none;
        background: #333;
        height: 1.5px;
        border-radius: 1px;
        outline: none;
        padding: 0;
        border: none;
        margin: 0;
      }
      #scrubber::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: #4fc3f7;
        border-radius: 50%;
        border: 3px solid #000;
      }

      .hud-bar {
        position: absolute;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 15px;
        font-size: 0.8rem;
        font-weight: bold;
        z-index: 450;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        visibility: hidden;
        transform: none;
      }
      #toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #fbc02d;
        color: black;
        padding: 12px 25px;
        border-radius: 50px;
        font-weight: bold;
        display: none;
        z-index: 10000;
      }
    </style>
  </head>
  <body>
    <div id="toast">Update Detected. Reloading...</div>
    <div id="settings-panel">
      <h2 style="margin-top: 0; color: #4fc3f7">Settings</h2>
      <div style="margin-bottom: 20px">
        <label>Cast IP</label
        ><input
          type="text"
          id="set-ip"
          style="width: 100%; box-sizing: border-box"
        />
      </div>
      <div style="margin-bottom: 20px">
        <label>Timeout</label
        ><select id="set-timeout" style="width: 100%">
          <option value="5">5s</option>
          <option value="10">10s</option>
          <option value="15">15s</option>
          <option value="30">30s</option>
          <option value="45">45s</option>
          <option value="60">1 minute</option>
          <option value="120">2 minutes</option>
          <option value="300">5 minutes</option>
        </select>
      </div>
      <button onclick="saveSettings()" style="width: 100%; background: #388e3c">
        SAVE
      </button>
      <button onclick="toggleSettings()" style="width: 100%; margin-top: 10px">
        CANCEL
      </button>
    </div>

    <div id="ui-header">
      <div id="trip-label">Initializing...</div>
      <form
        class="control-row"
        onsubmit="
          event.preventDefault();
          doSearch();
        "
      >
        <button
          id="cast-btn"
          type="button"
          class="btn-cast"
          data-status="OFF"
          onclick="toggleCast()"
        >
          CAST
        </button>
        <div id="timer">--</div>
        
        <input
          list="trips"
          id="search-input"
          placeholder="Search albums..."
          oninput="checkDatalist(this)"
        />
        <datalist id="trips"></datalist>
        
        <button type="button" onclick="toggleSettings()" class="icon-btn-header" title="Settings">
          <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
          </svg>
        </button>
      </form>
      
      <div
        id="cast-debug"
        style="
          font-size: 0.85rem;
          color: #fbc02d;
          padding: 0 15px;
          min-height: 1.2rem;
        "
      >
      </div>
      <div id="progress-outer"><div id="progress-inner"></div></div>
    </div>

    <div id="theater-container">
      <div id="img-wrapper">
        <div id="scan-overlay"><div id="scan-text">0%</div></div>
        <img id="hero-img" />
        <div id="hero-hud" class="hud-bar"><span id="hud-left"></span></div>
      </div>
      
      <div id="playback-controls">
        <button class="icon-btn" onclick="move(-50)" type="button" style="font-size:0.7rem">-50</button>
        <button class="icon-btn" onclick="move(-10)" type="button" style="font-size:0.7rem">-10</button>
        <button class="icon-btn" onclick="move(-1)" type="button">
          <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
        </button>
        <button class="icon-btn" onclick="togglePause()" id="pause-btn" type="button">
          <svg viewBox="0 0 24 24" id="pause-icon"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="icon-btn" onclick="move(1)" type="button">
          <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </button>
        <button class="icon-btn" onclick="move(10)" type="button" style="font-size:0.7rem">+10</button>
        <button class="icon-btn" onclick="move(50)" type="button" style="font-size:0.7rem">+50</button>
      </div>

      <div id="scrub-bar">
        <div id="scrub-count">0 / 0</div>
        <input
          type="range"
          id="scrubber"
          min="0"
          value="0"
          onmousedown="isScrubbing = true"
          onmouseup="isScrubbing = false"
          ontouchstart="isScrubbing = true"
          ontouchend="isScrubbing = false"
          oninput="onScrubInput(this.value)"
          onchange="onScrubChange(this.value)"
        />
      </div>
    </div>

    <script>
      let socket,
        tripList = [],
        isScrubbing = false,
        scrubTimer = null,
        state = {
          index: -1,
          total: 0,
          ready: new Set(),
          sess: null,
          isScanning: false,
          isPaused: false,
          files: {},
          exifs: {},
          trip: "",
          timeRemaining: 0,
        };
      let preloadCache = new Set();
      const BUFFER_SIZE = 25;
      let lastJumpTime = 0;

      let editingSettings = false;
      function toggleSettings() {
        const panel = document.getElementById("settings-panel");
        panel.classList.toggle("open");
        editingSettings = panel.classList.contains("open");
        if (editingSettings) setCastDebug("Editing settings...");
      }
      function togglePause() {
        if (state.isScanning) return;
        socket.send(JSON.stringify({ type: "TOGGLE_PAUSE" }));
      }

      function onScrubInput(val) {
        state.index = parseInt(val);
        document.getElementById("scrub-count").innerText =
          `${state.index + 1} / ${state.total}`;
        
        clearTimeout(scrubTimer);
        scrubTimer = setTimeout(() => {
          updateUI();
        }, 150);
      }
      
      function onScrubChange(val) {
        lastJumpTime = Date.now();
        clearTimeout(scrubTimer); 
        socket.send(JSON.stringify({ type: "JUMP", index: parseInt(val) }));
      }

      function getImgUrl(idx) {
        const displayTitle = state.trip || "Album";
        if (!state.ready.has(idx) || !state.files[idx])
          return (
            "/img/" +
            displayTitle.replace(/[^a-z0-9]/gi, "_") +
            "/status?t=" +
            Date.now()
          );
        return (
          "/img/" +
            displayTitle.replace(/[^a-z0-9]/gi, "_") +
            "/" +
            state.files[idx] +
            "?t=" +
            state.sess
        );
      }

      function managePreload() {
        if (state.total === 0 || state.isScanning) return;
        for (let i = -BUFFER_SIZE; i <= BUFFER_SIZE; i++) {
          const targetIdx = (state.index + i + state.total) % state.total;
          if (state.ready.has(targetIdx) && !preloadCache.has(targetIdx)) {
            const img = new Image();
            img.src = getImgUrl(targetIdx);
            preloadCache.add(targetIdx);
          }
        }
      }

      let connectTimeout;
      function connect() {
        clearTimeout(connectTimeout);
        // socket = new WebSocket("ws://" + location.host + "/ws");
        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${wsProtocol}//${location.host}/ws`);

        socket.onmessage = (e) => {
          const m = JSON.parse(e.data);
          
          if (m.type === "RELOAD") {
            document.getElementById("toast").style.display = "block";
            setTimeout(() => location.reload(true), 1500);
            return;
          }

          if (m.type === "CLEAR") {
            state.files = {};
            state.exifs = {};
            state.ready.clear();
            preloadCache.clear();
            document.getElementById("hud-left").innerText = "";
            updateUI();
            return;
          }
          if (m.type === "SYNC") {
            if (state.sess && state.sess !== m.sessionId) {
              document.getElementById("toast").style.display = "block";
              setTimeout(() => location.reload(true), 1000);
              return;
            }
            state.sess = m.sessionId;
            if (!isScrubbing && Date.now() - lastJumpTime > 800) {
              state.index = m.index;
            }
            
            state.isPaused = m.isPaused;
            const pauseSvg = document.getElementById("pause-icon");
            const pauseBtn = document.getElementById("pause-btn");
            if (state.isPaused) {
              pauseSvg.innerHTML = '<path d="M8 5v14l11-7z" />'; // Play triangle
              pauseBtn.classList.add("paused");
            } else {
              pauseSvg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />'; // Pause bars
              pauseBtn.classList.remove("paused");
            }

            if (!editingSettings) {
              document.getElementById("set-ip").value = m.settings.ip;
              document.getElementById("set-timeout").value = m.settings.timeout;
            }
            
            // Only update the button if we aren't currently waiting for a connection request to resolve
            const castBtn = document.getElementById("cast-btn");
            if (castBtn.getAttribute("data-status") !== "CONNECTING") {
              const castStatus = m.castStatus || "OFF";
              castBtn.setAttribute("data-status", castStatus);
              castBtn.disabled = (castStatus === "OFF");
            }

            state.total = m.total;
            state.isScanning = m.isScanning;
            state.trip = m.trip;
            state.timeRemaining = m.timeRemaining;
            if (m.files) state.files = { ...state.files, ...m.files };
            if (m.exifs) state.exifs = { ...state.exifs, ...m.exifs };
            if (m.ready) state.ready = new Set([...state.ready, ...m.ready]);
            const theater = document.getElementById("theater-container"),
              pCont = document.getElementById("progress-outer"),
              pBar = document.getElementById("progress-inner");
            if (m.isScanning) {
              theater.classList.add("is-preparing");
              document.getElementById("scan-text").innerText =
                (m.scanPercent || 0) + "%";
              pCont.style.display = "block";
              pBar.style.width = (m.scanPercent || 0) + "%";
            } else {
              theater.classList.remove("is-preparing");
              pCont.style.display = "none";
            }
            const scrub = document.getElementById("scrubber");
            scrub.max = Math.max(0, state.total - 1);
            if (!isScrubbing && Date.now() - lastJumpTime > 800)
              scrub.value = state.index;
            updateUI(m.trip);
            managePreload();
          }
          if (m.type === "READY") {
            state.ready.add(m.index);
            state.files[m.index] = m.file;
            state.exifs[m.index] = m.exif;
            updateUI();
            managePreload();
          }
        };
        socket.onclose = () => {
          connectTimeout = setTimeout(connect, 1000);
        };
      }

      function move(s) {
        if (!state.isScanning && state.total > 0)
          socket.send(JSON.stringify({ type: "MOVE", step: s }));
      }
      
      function updateUI(t) {
        const displayTitle = t || state.trip || "Album";
        document.getElementById("trip-label").innerText = displayTitle;
        document.getElementById("scrub-count").innerText =
          state.total > 0 ? `${state.index + 1} / ${state.total}` : "0 / 0";
        const img = document.getElementById("hero-img"),
          hud = document.getElementById("hero-hud");
        document.getElementById("timer").innerText =
          state.timeRemaining || "--";
        if (state.isScanning || state.total === 0) {
          img.src =
            "/img/" +
            displayTitle.replace(/[^a-z0-9]/gi, "_") +
            "/status?t=" +
            Date.now();
          hud.style.visibility = "hidden";
          return;
        }
        if (state.ready.has(state.index)) {
          img.src =
            "/img/" +
            displayTitle.replace(/[^a-z0-9]/gi, "_") +
            "/" +
            state.files[state.index] +
            "?t=" +
            state.sess;
          const exif = state.exifs[state.index];
          if (exif) {
            const isDark =
              String(exif.pc_is_dark ?? "").toLowerCase() === "true";
            hud.style.color = isDark ? "white" : "#eee";

            document.getElementById("hud-left").innerText = "";
            let hud_line = "";
            
            if (exif["Date/Time Original"]) {
              const dtParts = exif["Date/Time Original"].split(" ");
              const datePart = dtParts[0] ? dtParts[0].replace(/:/g, "-") : "";
              const timePart = dtParts[1] ? dtParts[1] : "";
              hud_line = timePart ? `${datePart} ${timePart}` : datePart;
            }

            hud_line += exif.pc_location ? " | " + exif.pc_location : "";
            hud_line += ` | F${exif.pc_aperture || "--"} | SS ${exif.pc_shutter || "--"} | ISO ${exif.pc_iso || "--"}`;
            
            const focalLength = exif["Focal Length In 35mm Format"] || exif["Focal Length 35mm Equiv"];
            let zoom = "--";
            if (focalLength) {
                const val = parseFloat(focalLength);
                if (!isNaN(val)) zoom = Math.round(val);
            }
            hud_line += ` | ZOOM (FF) ${zoom}`;
            
            document.getElementById("hud-left").innerText = hud_line;
            
            img.onload = () => {
              try {
                const wrapper = document.getElementById("img-wrapper");
                hud.style.width = img.clientWidth + "px";
                hud.style.left = img.offsetLeft + "px";
                hud.style.top = (img.offsetTop + img.clientHeight - hud.offsetHeight) + "px";
                hud.style.transform = "none";
                hud.style.visibility = "visible";
              } catch (e) {
                hud.style.visibility = "visible";
              }
            };
            window.requestAnimationFrame(() => {
              setTimeout(() => {
                if (!img.complete) return;
                img.onload && img.onload();
              }, 50);
            });
          }
        }
      }
      
      function checkDatalist(input) {
        if (tripList.includes(input.value)) doSearch(input.value);
      }
      function doSearch(val) {
        const q = val || document.getElementById("search-input").value;
        if (!q) return;
        fetch("/search?q=" + encodeURIComponent(q));
        document.getElementById("search-input").value = "";
        document.getElementById("search-input").blur();
      }
      
      function saveSettings() {
        const settings = {
          ip: document.getElementById("set-ip").value,
          timeout: parseInt(document.getElementById("set-timeout").value),
        };
        const saveBtn = event?.target || null;
        setCastDebug("Saving settings...");
        fetch("/update-settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(settings),
        })
          .then(async (res) => {
            if (!res.ok) {
              const txt = await res.text().catch(() => "");
              setCastDebug(
                `Save failed: ${res.status} ${res.statusText} ${txt}`,
              );
              return;
            }
            const data = await res.json().catch(() => null);
            if (!data || data.status !== "ok") {
              setCastDebug("Save failed: invalid response");
              return;
            }
            setCastDebug("Settings saved");
            if (data.settings) {
              document.getElementById("set-ip").value =
                data.settings.ip || document.getElementById("set-ip").value;
              document.getElementById("set-timeout").value =
                data.settings.timeout ||
                document.getElementById("set-timeout").value;
            }
            toggleSettings();
          })
          .catch((err) => {
            setCastDebug(`Save request error: ${err.message}`);
          });
      }

      function setCastDebug(msg) {
        const debug = document.getElementById("cast-debug");
        debug.innerText = msg;
      }

      function toggleCast() {
        const btn = document.getElementById("cast-btn");
        
        // Immediately lock the button and turn it Orange to indicate processing
        btn.disabled = true;
        btn.setAttribute("data-status", "CONNECTING");
        setCastDebug("Sending cast toggle request...");

        fetch("/toggle-cast")
          .then(async (res) => {
            if (!res.ok) {
              btn.setAttribute("data-status", "AVAILABLE"); // Fallback
              btn.disabled = false;
              const text = await res.text();
              setCastDebug(`Toggle failed: ${res.status} ${res.statusText} ${text}`);
              return;
            }
            const data = await res.json().catch(() => null);
            if (!data || data.status !== "ok") {
              btn.setAttribute("data-status", "AVAILABLE"); // Fallback
              btn.disabled = false;
              setCastDebug(`Toggle failed: invalid response`);
              return;
            }
            setCastDebug(``);
            
            // Server responds with final status, assign it and unlock if appropriate
            const newStatus = data.castStatus || "OFF";
            btn.setAttribute("data-status", newStatus);
            btn.disabled = (newStatus === "OFF");
          })
          .catch((err) => {
            btn.setAttribute("data-status", "AVAILABLE"); // Fallback
            btn.disabled = false;
            setCastDebug(`Toggle request error: ${err.message}`);
          });
      }

      window.addEventListener("keydown", (e) => {
        if (state.isScanning) return;
        if (e.key === "ArrowLeft") move(-1);
        if (e.key === "ArrowRight") move(1);
        if (e.key === " ") {
          e.preventDefault();
          togglePause();
        }
      });

      // Mobile swipe handling for navigating photos
      (function () {
        const wrapper = document.getElementById("img-wrapper");
        let touchStartX = 0,
          touchStartY = 0,
          touchStartTime = 0,
          touchMoved = false;
        const THRESHOLD = 50; 
        wrapper.addEventListener(
          "touchstart",
          (ev) => {
            if (state.isScanning) return;
            if (!ev.touches || ev.touches.length !== 1) return;
            const t = ev.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
            touchStartTime = Date.now();
            touchMoved = false;
          },
          { passive: true },
        );
        wrapper.addEventListener(
          "touchmove",
          (ev) => {
            touchMoved = true;
          },
          { passive: true },
        );
        wrapper.addEventListener(
          "touchend",
          (ev) => {
            if (state.isScanning) return;
            const t = ev.changedTouches && ev.changedTouches[0];
            if (!t) return;
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            if (Math.abs(dx) > THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
              if (dx < 0) move(1);
              else move(-1);
            }
          },
          { passive: true },
        );
      })();
      
      const isMobile =
        "ontouchstart" in window ||
        (navigator.userAgent || "").includes("Mobi");
      fetch("/trips-list")
        .then((r) => r.json())
        .then((l) => {
          tripList = l;
          const dl = document.getElementById("trips");
          l.forEach((t) => {
            let o = document.createElement("option");
            o.value = t;
            dl.appendChild(o);
          });
          if (isMobile) {
            const sel = document.createElement("select");
            sel.id = "trips-select";
            sel.style.display = "none";
            sel.style.position = "absolute";
            sel.style.left = "10px";
            sel.style.right = "10px";
            sel.style.top = "56px";
            sel.style.zIndex = 10000;
            sel.style.fontSize = "16px";
            sel.style.padding = "8px";
            l.forEach((t) => {
              const o = document.createElement("option");
              o.value = t;
              o.innerText = t;
              sel.appendChild(o);
            });
            document.body.appendChild(sel);
            const input = document.getElementById("search-input");
            input.addEventListener("focus", () => {
              sel.size = Math.min(8, l.length);
              sel.style.display = "block";
              sel.focus();
            });
            sel.addEventListener("change", () => {
              input.value = sel.value;
              doSearch(sel.value);
              sel.style.display = "none";
            });
            sel.addEventListener("blur", () => {
              setTimeout(() => (sel.style.display = "none"), 150);
            });
          }
        });
        
      connect();

      // Handle mobile browser backgrounding/foregrounding
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          if (socket) {
            socket.onclose = null; 
            socket.close();
          }
          connect(); 
        }
      });

      // recompute HUD position on window resize
      window.addEventListener(
        "resize",
        () => {
          const img = document.getElementById("hero-img"),
            hud = document.getElementById("hero-hud");
          if (!img || !hud) return;
          if (!img.complete) return;
          try {
            const wrapper = document.getElementById("img-wrapper");
            hud.style.width = img.clientWidth + "px";
            hud.style.left = img.offsetLeft + "px";
            hud.style.top = (img.offsetTop + img.clientHeight - hud.offsetHeight) + "px";
          } catch (e) {}
        },
        { passive: true },
      );
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker
          .register('/sw.js')
          .catch((err) => console.error('SW install failed:', err));
      }
    </script>
  </body>
</html>
